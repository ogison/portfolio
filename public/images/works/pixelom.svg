<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <rect width="128" height="128" fill="#0b0b0b" />
  <rect x="14" y="14" width="100" height="100" fill="#151515" stroke="#ffffff" stroke-width="4" />

  <!-- Pixel grid: original -> dotified illustration -->
  <!-- Left: smooth gradient block -->
  <rect x="26" y="30" width="32" height="32" fill="#5fb3ff" />
  <rect x="26" y="30" width="32" height="8" fill="#7ec5ff" />
  <rect x="26" y="54" width="32" height="8" fill="#3a8fdc" />

  <!-- Arrow -->
  <rect x="60" y="42" width="8" height="8" fill="#ffffff" />
  <rect x="68" y="42" width="8" height="8" fill="#ffffff" />

  <!-- Right: dotified version (bigger pixels) -->
  <rect x="78" y="30" width="16" height="16" fill="#7ec5ff" />
  <rect x="94" y="30" width="16" height="16" fill="#5fb3ff" />
  <rect x="78" y="46" width="16" height="16" fill="#5fb3ff" />
  <rect x="94" y="46" width="16" height="16" fill="#3a8fdc" />

  <!-- Bottom dot row -->
  <rect x="26" y="74" width="10" height="10" fill="#e60012" />
  <rect x="40" y="74" width="10" height="10" fill="#f7d51d" />
  <rect x="54" y="74" width="10" height="10" fill="#92cc41" />
  <rect x="68" y="74" width="10" height="10" fill="#5fb3ff" />
  <rect x="82" y="74" width="10" height="10" fill="#b967ff" />
  <rect x="96" y="74" width="10" height="10" fill="#ffffff" />

  <text x="64" y="106" fill="#ffffff" font-family="monospace" font-size="14" text-anchor="middle">
    DOT
  </text>
</svg>
